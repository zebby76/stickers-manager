---
name: Release

run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compose release body
        id: body
        run: |
          IMG="zebby76/stickers-manager"
          TAG="${{ github.ref_name }}"
          {
            echo "body<<EOF"
            echo "### Docker images"
            echo ""
            echo '```bash'
            echo "docker pull ${IMG}:${TAG}        # production"
            echo "docker pull ${IMG}:${TAG}-dev    # development"
            echo '```'
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: ${{ steps.body.outputs.body }}
