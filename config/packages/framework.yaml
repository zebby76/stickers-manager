# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    # Sessions are stored in PostgreSQL (PdoSessionHandler, see services.yaml) so they
    # survive container restarts: in production the container is read-only with a tmpfs
    # var/, and Sablier scale-to-zero stops/starts it — a file handler would drop them.
    session:
        handler_id: Symfony\Component\HttpFoundation\Session\Storage\Handler\PdoSessionHandler

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
