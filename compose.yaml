---
# Local development: the repo is bind-mounted into base-php:nginx-dev at the
# runtime path (/app/src/stickers) for live reload. Production images are built
# from the Dockerfile (see `make build-image` / `make bake`).
name: stickers

services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stickers
      POSTGRES_USER: stickers
      POSTGRES_PASSWORD: stickers
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stickers -d stickers"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Make the Symfony var/ volume writable by the app user (uid 1001).
  init-var-permissions:
    image: busybox
    command: sh -c "chmod -R 777 /v"
    volumes:
      - app-var:/v

  app:
    image: smalswebtech/base-php:8.5-nginx-dev
    depends_on:
      database:
        condition: service_healthy
      init-var-permissions:
        condition: service_completed_successfully
    environment:
      APP_ENV: "dev"
      APP_DEBUG: "1"
      APP_SECRET: "stickers_dev_secret_change_in_prod"
      DATABASE_URL: "postgresql://stickers:stickers@database:5432/stickers?serverVersion=16&charset=utf8"
      VARNISH_ENABLED: "false"
      NGINX_REAL_IP_ENABLED: "true"
      NGINX_CLIENT_MAX_BODY_SIZE: "8m"
      # Rate limiting on (dry-run in dev: logged, never rejected)
      NGINX_SOFT_THROTTLE_ENABLED: "true"
      NGINX_SOFT_THROTTLE_DRY_RUN_ENABLED: "on"
      # FastCGI micro-cache left OFF in dev for predictability (ON in the prod image)
      NGINX_FASTCGI_CACHE_ENABLED: "false"
    ports:
      - "8080:9000"   # app
      - "9090:9090"   # metrics (nginx VTS /metrics + php-fpm /status)
    volumes:
      # Live-mounted application code at the runtime path
      - ./:/app/src/stickers:rw
      # Symfony writable runtime dir (cache, logs, sessions)
      - app-var:/app/src/stickers/var:rw
      # Packaging overlay (nginx vhost + setup script), as in the built image
      - ./.docker/config/nginx/sites-enabled/zz-stickers.conf.tmpl:/opt/config/nginx/sites-enabled/zz-stickers.conf.tmpl:ro
      - ./.docker/bin/container-entrypoint.d/10-stickers-setup.sh:/opt/bin/container-entrypoint.d/10-stickers-setup.sh:ro
    tmpfs:
      - /opt/sbin:rw,exec,size=8m,mode=1777
      - /opt/etc:rw,noexec,size=16m,mode=1777
      - /app/tmp:rw,noexec,size=64m,mode=1777
      - /app/var/run:rw,size=16m,mode=1777
    read_only: true
    healthcheck:
      test: ["CMD-SHELL", "supervisorctl -c /opt/etc/supervisord.conf status php-fpm nginx | grep -c RUNNING | grep -q 2 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  adminer:
    image: adminer:5
    depends_on:
      database:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: database
    ports:
      - "8081:8080"

volumes:
  db-data:
  app-var:
